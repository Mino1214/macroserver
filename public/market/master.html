<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Market Master</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 16px; }
    h1 { font-size: 1.25rem; }
    section { margin: 20px 0; padding: 16px; border: 1px solid #ddd; border-radius: 8px; }
    label { display: block; margin-top: 8px; font-size: 0.9rem; }
    input, button { margin-top: 4px; padding: 8px; width: 100%; max-width: 320px; box-sizing: border-box; }
    button { cursor: pointer; background: #111; color: #fff; border: none; border-radius: 6px; }
    pre { background: #f4f4f4; padding: 12px; overflow: auto; font-size: 12px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  </style>
</head>
<body>
  <h1>마켓 Master</h1>
  <section>
    <h2>로그인 (MASTER_ID / MASTER_PW)</h2>
    <label>login_id <input id="mid" /></label>
    <label>password <input id="mpw" type="password" /></label>
    <label><button type="button" id="mbtn">토큰 발급</button></label>
    <p>액세스 토큰은 로컬 스토리지에 저장됩니다.</p>
  </section>
  <section>
    <h2>운영자 생성</h2>
    <label>name <input id="oname" /></label>
    <label>login_id <input id="ologin" /></label>
    <label>password <input id="opw" type="password" /></label>
    <label>site_domain <input id="odom" placeholder="a.example.com" /></label>
    <label><button type="button" id="ocreate">생성</button></label>
  </section>
  <section>
    <h2>통계 / 운영자 목록</h2>
    <div class="row">
      <button type="button" id="gstats">통계</button>
      <button type="button" id="gops">운영자 목록</button>
      <button type="button" id="gpol">정책</button>
    </div>
    <pre id="out">응답이 여기에 표시됩니다.</pre>
  </section>
  <script>
    const api = (path, opts = {}) =>
      fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', ...opts.headers } }).then(async (r) => {
        const t = await r.text();
        let j; try { j = JSON.parse(t); } catch { j = t; }
        if (!r.ok) throw new Error(typeof j === 'object' && j.error ? j.error : t);
        return j;
      });
    const token = () => localStorage.getItem('marketAccess') || '';
    document.getElementById('mbtn').onclick = async () => {
      const body = { login_id: document.getElementById('mid').value, password: document.getElementById('mpw').value };
      const j = await api('/api/market/auth/login', { method: 'POST', body: JSON.stringify(body) });
      localStorage.setItem('marketAccess', j.accessToken);
      localStorage.setItem('marketRefresh', j.refreshToken);
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    };
    document.getElementById('ocreate').onclick = async () => {
      const body = {
        name: document.getElementById('oname').value,
        login_id: document.getElementById('ologin').value,
        password: document.getElementById('opw').value,
        site_domain: document.getElementById('odom').value,
      };
      const j = await api('/api/market/master/operators', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token() },
        body: JSON.stringify(body),
      });
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    };
    document.getElementById('gstats').onclick = async () => {
      const j = await api('/api/market/master/stats', { headers: { Authorization: 'Bearer ' + token() } });
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    };
    document.getElementById('gops').onclick = async () => {
      const j = await api('/api/market/master/operators', { headers: { Authorization: 'Bearer ' + token() } });
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    };
    document.getElementById('gpol').onclick = async () => {
      const j = await api('/api/market/master/policy', { headers: { Authorization: 'Bearer ' + token() } });
      document.getElementById('out').textContent = JSON.stringify(j, null, 2);
    };
  </script>
</body>
</html>
